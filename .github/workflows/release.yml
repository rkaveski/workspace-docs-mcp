name: release

# Manual-trigger only until PyPI trusted publishing is configured for this
# repo (pypi.org → Publishing → add GitHub publisher for release.yml).
# Once that's set up, restore the tag trigger:
#
#   on:
#     push:
#       tags:
#         - "v*"
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        run: uv publish
